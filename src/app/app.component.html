<app-navbar></app-navbar>

<main class="relative overflow-hidden" [@routeAnimation]="prepareRoute(outlet)">
  <router-outlet #outlet="outlet"></router-outlet>
</main>

<app-footer></app-footer>

<!-- Scroll to Top Button -->
<button
  *ngIf="showScrollTop"
  (click)="scrollToTop()"
  class="fixed bottom-6 right-6 z-40 w-12 h-12 rounded-full
    bg-primary-600 hover:bg-primary-700 text-white shadow-lg
    shadow-primary-500/25 flex items-center justify-center
    transition-all duration-300 hover:scale-110 animate-fade-in"
  aria-label="Scroll to top"
>
  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
  </svg>
</button>
