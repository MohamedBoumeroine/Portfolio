<section class="section-container pt-28">
  <!-- Heading -->
  <div appScrollReveal>
    <h2 class="section-heading">My <span class="gradient-text">Projects</span></h2>
    <p class="section-subheading">A showcase of my recent work</p>
  </div>

  <!-- Filter Buttons -->
  <div class="flex justify-center gap-3 mb-10" appScrollReveal>
    <button
      (click)="filter = 'all'"
      class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300"
      [ngClass]="{
        'bg-primary-600 text-white shadow-lg shadow-primary-500/25': filter === 'all',
        'bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-slate-700': filter !== 'all'
      }"
    >
      All Projects
    </button>
    <button
      (click)="filter = 'featured'"
      class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300"
      [ngClass]="{
        'bg-primary-600 text-white shadow-lg shadow-primary-500/25': filter === 'featured',
        'bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-slate-700': filter !== 'featured'
      }"
    >
      Featured
    </button>
  </div>

  <!-- Projects Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" *ngIf="projects$ | async as projects">
    <ng-container *ngFor="let project of projects; let i = index">
      <div
        *ngIf="filter === 'all' || project.featured"
        class="card project-card group cursor-pointer overflow-hidden relative"
        appScrollReveal
        [revealDirection]="i % 3 === 0 ? 'left' : i % 3 === 1 ? 'up' : 'right'"
        [revealDelay]="i * 120"
        (click)="openModal(project)"
      >
        <!-- Project Image / Placeholder -->
        <div class="h-48 bg-gradient-to-br from-primary-500/20 to-accent-500/20 dark:from-primary-600/30 dark:to-accent-600/30 relative overflow-hidden">
          <div class="absolute inset-0 flex items-center justify-center">
            <svg class="w-16 h-16 text-primary-400/50 dark:text-primary-500/50 group-hover:scale-110 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
            </svg>
          </div>
          <!-- Featured Badge -->
          <div
            *ngIf="project.featured"
            class="absolute top-3 right-3 px-3 py-1 bg-primary-600 text-white text-xs font-semibold rounded-full"
          >
            Featured
          </div>
          <!-- Hover Overlay -->
          <div class="absolute inset-0 bg-primary-600/0 group-hover:bg-primary-600/80 transition-all duration-300 flex items-center justify-center">
            <span class="text-white font-semibold opacity-0 group-hover:opacity-100 transition-opacity duration-300 translate-y-4 group-hover:translate-y-0">
              View Details
            </span>
          </div>
        </div>

        <!-- Card Content -->
        <div class="p-6">
          <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors">
            {{ project.title }}
          </h3>
          <p class="text-gray-500 dark:text-gray-400 text-sm mb-4 line-clamp-2">
            {{ project.description }}
          </p>
          <!-- Tech Tags -->
          <div class="flex flex-wrap gap-2">
            <span
              *ngFor="let tech of project.technologies | slice:0:4"
              class="px-2.5 py-1 text-xs font-medium rounded-lg
                bg-primary-50 dark:bg-primary-900/30
                text-primary-700 dark:text-primary-300"
            >
              {{ tech }}
            </span>
            <span
              *ngIf="project.technologies.length > 4"
              class="px-2.5 py-1 text-xs font-medium rounded-lg
                bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-400"
            >
              +{{ project.technologies.length - 4 }}
            </span>
          </div>
        </div>
      </div>
    </ng-container>
  </div>
</section>

<!-- Project Detail Modal -->
<div
  *ngIf="selectedProject"
  class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in"
  (click)="onBackdropClick($event)"
>
  <div class="card modal-content max-w-2xl w-full max-h-[85vh] overflow-y-auto">
    <!-- Modal Header -->
    <div class="p-6 border-b border-gray-100 dark:border-slate-700 flex items-start justify-between">
      <div>
        <h3 class="text-2xl font-bold text-gray-900 dark:text-white">{{ selectedProject.title }}</h3>
        <div class="flex flex-wrap gap-2 mt-3">
          <span
            *ngFor="let tech of selectedProject.technologies"
            class="px-2.5 py-1 text-xs font-medium rounded-lg
              bg-primary-50 dark:bg-primary-900/30
              text-primary-700 dark:text-primary-300"
          >
            {{ tech }}
          </span>
        </div>
      </div>
      <button
        (click)="closeModal()"
        class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors text-gray-500"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="p-6">
      <p class="text-gray-600 dark:text-gray-300 leading-relaxed mb-6">
        {{ selectedProject.longDescription }}
      </p>

      <!-- Links -->
      <div class="flex gap-3">
        <a
          *ngIf="selectedProject.liveUrl"
          [href]="selectedProject.liveUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-primary text-sm"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
          </svg>
          Live Demo
        </a>
        <a
          *ngIf="selectedProject.githubUrl"
          [href]="selectedProject.githubUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-outline text-sm"
        >
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          Source Code
        </a>
      </div>
    </div>
  </div>
</div>
