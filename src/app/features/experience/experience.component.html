<section class="section-container pt-28">
  <!-- Heading -->
  <div appScrollReveal>
    <h2 class="section-heading">My <span class="gradient-text">Experience</span></h2>
    <p class="section-subheading">My professional journey and education</p>
  </div>

  <!-- Timeline -->
  <div class="relative max-w-3xl mx-auto" *ngIf="experience$ | async as experiences">
    <!-- Timeline Line (animated gradient) -->
    <div class="timeline-line absolute left-4 md:left-1/2 md:-translate-x-px top-0 bottom-0 w-0.5"></div>

    <!-- Timeline Items -->
    <div *ngFor="let exp of experiences; let i = index; let odd = odd" class="relative mb-12">
      <div
        class="flex items-start gap-6 md:gap-0"
        [ngClass]="{ 'md:flex-row-reverse': odd }"
        appScrollReveal
        [revealDirection]="odd ? 'right' : 'left'"
        [revealDelay]="i * 150"
      >
        <!-- Timeline Dot with pulse -->
        <div class="absolute left-4 md:left-1/2 -translate-x-1/2 z-10">
          <div class="timeline-dot-wrapper relative">
            <!-- Pulse ring -->
            <div
              class="absolute inset-0 rounded-full animate-ping opacity-20"
              [ngClass]="{
                'bg-primary-500': exp.type === 'work',
                'bg-accent-500': exp.type === 'education'
              }"
              style="animation-duration: 3s"
            ></div>
            <div
              class="relative w-4 h-4 rounded-full border-4 transition-all duration-300 hover:scale-150"
              [ngClass]="{
                'bg-primary-500 border-primary-200 dark:border-primary-900': exp.type === 'work',
                'bg-accent-500 border-accent-200 dark:border-accent-900': exp.type === 'education'
              }"
            ></div>
          </div>
        </div>

        <!-- Content Card with hover lift -->
        <div
          class="ml-12 md:ml-0 md:w-[calc(50%-2rem)] card p-6 timeline-card"
          [ngClass]="{ 'md:mr-auto md:pr-8': !odd, 'md:ml-auto md:pl-8': odd }"
        >
          <!-- Type Badge -->
          <span
            class="inline-block px-3 py-1 text-xs font-semibold rounded-full mb-3"
            [ngClass]="{
              'bg-primary-100 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300': exp.type === 'work',
              'bg-accent-100 dark:bg-accent-900/40 text-accent-700 dark:text-accent-300': exp.type === 'education'
            }"
          >
            {{ exp.type === 'work' ? 'Work' : 'Education' }}
          </span>

          <!-- Role & Company -->
          <h3 class="text-lg font-bold text-gray-900 dark:text-white">{{ exp.role }}</h3>
          <p class="text-primary-600 dark:text-primary-400 font-medium text-sm mb-1">
            {{ exp.company }}
          </p>

          <!-- Date & Location -->
          <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500 dark:text-gray-400 mb-3">
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              {{ formatDate(exp.startDate) }} — {{ formatDate(exp.endDate) }}
            </span>
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              {{ exp.location }}
            </span>
          </div>

          <!-- Description -->
          <p class="text-gray-600 dark:text-gray-300 text-sm mb-3">{{ exp.description }}</p>

          <!-- Highlights -->
          <ul class="space-y-1.5">
            <li
              *ngFor="let h of exp.highlights"
              class="flex items-start gap-2 text-sm text-gray-500 dark:text-gray-400"
            >
              <svg class="w-4 h-4 text-primary-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
              <span>{{ h }}</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
