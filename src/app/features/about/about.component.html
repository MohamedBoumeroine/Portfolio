<section class="section-container pt-28">
  <!-- Heading -->
  <div appScrollReveal>
    <h2 class="section-heading">About <span class="gradient-text">Me</span></h2>
    <p class="section-subheading">Get to know me and my skills</p>
  </div>

  <div *ngIf="info$ | async as info">
    <!-- Bio Section -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-20" appScrollReveal>
      <!-- Left - Info Card -->
      <div class="card p-8">
        <div class="flex items-center gap-4 mb-6">
          <div class="w-16 h-16 rounded-2xl overflow-hidden bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center text-white text-2xl font-bold">
            <img *ngIf="info.avatar" [src]="info.avatar" [alt]="info.name" class="w-full h-full object-cover">
            <span *ngIf="!info.avatar">MB</span>
          </div>
          <div>
            <h3 class="text-xl font-bold text-gray-900 dark:text-white">{{ info.name }}</h3>
            <p class="text-primary-600 dark:text-primary-400 font-medium">{{ info.title }}</p>
          </div>
        </div>
        <p class="text-gray-600 dark:text-gray-300 leading-relaxed mb-6">{{ info.bio }}</p>
        <div class="space-y-3 text-sm">
          <div class="flex items-center gap-3 text-gray-600 dark:text-gray-400">
            <svg class="w-5 h-5 text-primary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span>{{ info.location }}</span>
          </div>
          <div class="flex items-center gap-3 text-gray-600 dark:text-gray-400">
            <svg class="w-5 h-5 text-primary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <span>{{ info.email }}</span>
          </div>
          <div class="flex items-center gap-3 text-gray-600 dark:text-gray-400" *ngIf="info.phone">
            <svg class="w-5 h-5 text-primary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
            </svg>
            <span>{{ info.phone }}</span>
          </div>
        </div>
      </div>

      <!-- Right - Stats with count-up -->
      <div class="grid grid-cols-2 gap-4">
        <div class="card p-6 text-center group hover:border-primary-300 dark:hover:border-primary-700" appScrollReveal revealDirection="scale" [revealDelay]="0">
          <div class="text-3xl font-extrabold gradient-text mb-1" [appCountUp]="'4'" countSuffix="+">4+</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">Years Experience</div>
        </div>
        <div class="card p-6 text-center group hover:border-primary-300 dark:hover:border-primary-700" appScrollReveal revealDirection="scale" [revealDelay]="100">
          <div class="text-3xl font-extrabold gradient-text mb-1" [appCountUp]="'4'">4</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">Major Projects</div>
        </div>
        <div class="card p-6 text-center group hover:border-primary-300 dark:hover:border-primary-700" appScrollReveal revealDirection="scale" [revealDelay]="200">
          <div class="text-3xl font-extrabold gradient-text mb-1" [appCountUp]="'20'" countSuffix="+">20+</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">Technologies</div>
        </div>
        <div class="card p-6 text-center group hover:border-primary-300 dark:hover:border-primary-700" appScrollReveal revealDirection="scale" [revealDelay]="300">
          <div class="text-3xl font-extrabold gradient-text mb-1">UIR</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">Engineer's Degree</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Skills Section -->
  <div appScrollReveal #skillsSection>
    <h3 class="text-2xl font-bold text-center mb-8 text-gray-900 dark:text-white">
      Technical Skills
    </h3>

    <!-- Category Tabs -->
    <div class="flex justify-center gap-2 mb-10 flex-wrap">
      <button
        *ngFor="let cat of categories"
        (click)="setCategory(cat.key)"
        class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300"
        [ngClass]="{
          'bg-primary-600 text-white shadow-lg shadow-primary-500/25': activeCategory === cat.key,
          'bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-slate-700': activeCategory !== cat.key
        }"
      >
        {{ cat.label }}
      </button>
    </div>

    <!-- Skill Bars with scroll-triggered fill animation -->
    <div class="max-w-2xl mx-auto space-y-5" *ngIf="skills$ | async as skills"
         [@skillListAnimation]="activeCategory">
      <ng-container *ngFor="let skill of skills; let i = index">
        <div
          *ngIf="skill.category === activeCategory"
          class="group skill-bar-item"
          @skillBarAnimation
        >
          <div class="flex justify-between mb-2">
            <span class="text-sm font-semibold text-gray-700 dark:text-gray-300 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors">
              {{ skill.name }}
            </span>
            <span class="text-sm font-mono text-primary-600 dark:text-primary-400 font-bold">
              {{ skill.level }}%
            </span>
          </div>
          <div class="h-3 bg-gray-100 dark:bg-slate-700 rounded-full overflow-hidden relative">
            <div
              class="skill-bar-fill h-full rounded-full bg-gradient-to-r from-primary-500 to-accent-500 relative overflow-hidden"
              [style.width.%]="skillsVisible ? skill.level : 0"
            >
              <!-- Shimmer effect on the bar -->
              <div class="absolute inset-0 shimmer-effect"></div>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</section>
