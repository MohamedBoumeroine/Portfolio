<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [ngClass]="{
    'glass shadow-lg': isScrolled,
    'bg-transparent': !isScrolled
  }"
>
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 md:h-20">
      <!-- Logo -->
      <a
        routerLink="/"
        class="text-xl md:text-2xl font-bold gradient-text tracking-tight"
      >
        &lt;Dev /&gt;
      </a>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-1">
        <a
          *ngFor="let link of navLinks"
          [routerLink]="link.route"
          routerLinkActive="text-primary-600 dark:text-primary-400"
          [routerLinkActiveOptions]="{ exact: link.route === '/' }"
          class="px-4 py-2 rounded-lg text-sm font-medium
            text-gray-700 dark:text-gray-300
            hover:text-primary-600 dark:hover:text-primary-400
            hover:bg-primary-50 dark:hover:bg-primary-900/30
            transition-all duration-200"
        >
          {{ link.label }}
        </a>

        <!-- Theme Toggle -->
        <button
          (click)="toggleTheme()"
          class="ml-3 p-2.5 rounded-xl
            text-gray-600 dark:text-gray-300
            hover:bg-gray-100 dark:hover:bg-slate-800
            transition-all duration-200"
          [attr.aria-label]="(isDark$ | async) ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          <!-- Sun icon -->
          <svg *ngIf="isDark$ | async" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <!-- Moon icon -->
          <svg *ngIf="!(isDark$ | async)" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
      </div>

      <!-- Mobile Menu Button -->
      <div class="flex md:hidden items-center gap-2">
        <button
          (click)="toggleTheme()"
          class="p-2 rounded-lg text-gray-600 dark:text-gray-300
            hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors"
        >
          <svg *ngIf="isDark$ | async" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <svg *ngIf="!(isDark$ | async)" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>

        <button
          (click)="toggleMenu()"
          class="p-2 rounded-lg text-gray-600 dark:text-gray-300
            hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors"
        >
          <!-- Hamburger -->
          <svg *ngIf="!mobileMenuOpen" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <!-- Close -->
          <svg *ngIf="mobileMenuOpen" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div
    *ngIf="mobileMenuOpen"
    class="md:hidden glass border-t border-gray-200 dark:border-slate-700 animate-fade-in-down"
  >
    <div class="px-4 py-3 space-y-1">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.route"
        routerLinkActive="text-primary-600 dark:text-primary-400 bg-primary-50 dark:bg-primary-900/30"
        [routerLinkActiveOptions]="{ exact: link.route === '/' }"
        (click)="closeMenu()"
        class="block px-4 py-2.5 rounded-lg text-sm font-medium
          text-gray-700 dark:text-gray-300
          hover:text-primary-600 dark:hover:text-primary-400
          hover:bg-primary-50 dark:hover:bg-primary-900/30
          transition-all duration-200"
      >
        {{ link.label }}
      </a>
    </div>
  </div>
</nav>
