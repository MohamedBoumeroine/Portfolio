<!--
  Developer Workspace Animated SVG Illustration
  - Laptop with animated code lines and blinking cursor
  - Floating tech badges (Angular, Spring, API)
  - Coffee mug with rising steam
  - Small potted plant
  - Ambient glow behind monitor
  All animations are pure CSS, no JS dependencies.
-->
<div class="illustration-wrapper" role="img" [attr.aria-label]="ariaLabel">
  <svg
    viewBox="0 0 520 460"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
    class="illustration-svg"
  >
    <defs>
      <!-- Monitor glow gradient -->
      <radialGradient id="monitorGlow" cx="50%" cy="40%" r="50%">
        <stop offset="0%" class="glow-start" />
        <stop offset="100%" class="glow-end" />
      </radialGradient>

      <!-- Screen gradient -->
      <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" class="screen-top" />
        <stop offset="100%" class="screen-bottom" />
      </linearGradient>

      <!-- Coffee steam blur -->
      <filter id="steamBlur">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
      </filter>

      <!-- Desk surface gradient -->
      <linearGradient id="deskGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" class="desk-start" />
        <stop offset="50%" class="desk-mid" />
        <stop offset="100%" class="desk-end" />
      </linearGradient>
    </defs>

    <!-- ===== AMBIENT GLOW ===== -->
    <ellipse cx="260" cy="200" rx="180" ry="140" fill="url(#monitorGlow)" class="ambient-glow" />

    <!-- ===== DESK SURFACE ===== -->
    <path d="M40 370 Q260 355 480 370 L500 390 Q260 380 20 390 Z"
          fill="url(#deskGrad)" class="desk" />
    <!-- Desk edge highlight -->
    <path d="M40 370 Q260 355 480 370" stroke-width="1" class="desk-edge" fill="none" />

    <!-- ===== LAPTOP BASE ===== -->
    <rect x="155" y="360" width="210" height="12" rx="3" class="laptop-base" />
    <!-- Trackpad -->
    <rect x="235" y="363" width="50" height="6" rx="2" class="trackpad" />

    <!-- ===== LAPTOP SCREEN ===== -->
    <!-- Screen outer frame -->
    <rect x="120" y="110" width="280" height="255" rx="12" class="monitor-frame" />
    <!-- Screen inner -->
    <rect x="130" y="120" width="260" height="230" rx="6" fill="url(#screenBg)" />

    <!-- ===== CODE ON SCREEN ===== -->
    <g class="code-lines">
      <!-- Line 1: import statement -->
      <rect x="148" y="142" width="12" height="4" rx="1" class="code-keyword" />
      <rect x="164" y="142" width="44" height="4" rx="1" class="code-string" />
      <rect x="212" y="142" width="16" height="4" rx="1" class="code-keyword" />
      <rect x="232" y="142" width="56" height="4" rx="1" class="code-string" />

      <!-- Line 2: import -->
      <rect x="148" y="154" width="12" height="4" rx="1" class="code-keyword" />
      <rect x="164" y="154" width="36" height="4" rx="1" class="code-string" />
      <rect x="204" y="154" width="16" height="4" rx="1" class="code-keyword" />
      <rect x="224" y="154" width="70" height="4" rx="1" class="code-string" />

      <!-- Line 3: blank -->

      <!-- Line 4: @Component decorator -->
      <rect x="148" y="172" width="60" height="4" rx="1" class="code-decorator" />

      <!-- Line 5: selector -->
      <rect x="160" y="184" width="28" height="4" rx="1" class="code-prop" />
      <rect x="192" y="184" width="64" height="4" rx="1" class="code-string" />

      <!-- Line 6: template -->
      <rect x="160" y="196" width="36" height="4" rx="1" class="code-prop" />
      <rect x="200" y="196" width="84" height="4" rx="1" class="code-string" />

      <!-- Line 7: closing -->
      <rect x="148" y="208" width="12" height="4" rx="1" class="code-bracket" />

      <!-- Line 8: export class -->
      <rect x="148" y="224" width="20" height="4" rx="1" class="code-keyword" />
      <rect x="172" y="224" width="16" height="4" rx="1" class="code-keyword" />
      <rect x="192" y="224" width="56" height="4" rx="1" class="code-class" />
      <rect x="252" y="224" width="8" height="4" rx="1" class="code-bracket" />

      <!-- Line 9: property -->
      <rect x="160" y="240" width="24" height="4" rx="1" class="code-prop" />
      <rect x="188" y="240" width="8" height="4" rx="1" class="code-operator" />
      <rect x="200" y="240" width="40" height="4" rx="1" class="code-string" />

      <!-- Line 10: method -->
      <rect x="160" y="256" width="40" height="4" rx="1" class="code-method" />
      <rect x="204" y="256" width="8" height="4" rx="1" class="code-bracket" />
      <rect x="216" y="256" width="8" height="4" rx="1" class="code-bracket" />
      <rect x="228" y="256" width="8" height="4" rx="1" class="code-bracket" />

      <!-- Line 11: body -->
      <rect x="172" y="268" width="16" height="4" rx="1" class="code-keyword" />
      <rect x="192" y="268" width="8" height="4" rx="1" class="code-operator" />
      <rect x="204" y="268" width="68" height="4" rx="1" class="code-method" />

      <!-- Line 12: closing braces -->
      <rect x="160" y="280" width="8" height="4" rx="1" class="code-bracket" />

      <!-- Line 13: closing class -->
      <rect x="148" y="296" width="8" height="4" rx="1" class="code-bracket" />
    </g>

    <!-- Blinking cursor -->
    <rect x="160" y="296" width="2" height="10" rx="1" class="cursor" />

    <!-- Line numbers gutter -->
    <g class="line-numbers">
      <text x="140" y="146" text-anchor="end">1</text>
      <text x="140" y="158" text-anchor="end">2</text>
      <text x="140" y="170" text-anchor="end">3</text>
      <text x="140" y="176" text-anchor="end">4</text>
      <text x="140" y="188" text-anchor="end">5</text>
      <text x="140" y="200" text-anchor="end">6</text>
      <text x="140" y="212" text-anchor="end">7</text>
      <text x="140" y="228" text-anchor="end">8</text>
      <text x="140" y="244" text-anchor="end">9</text>
      <text x="140" y="260" text-anchor="end">10</text>
      <text x="140" y="272" text-anchor="end">11</text>
      <text x="140" y="284" text-anchor="end">12</text>
      <text x="140" y="300" text-anchor="end">13</text>
    </g>

    <!-- Screen top bar (window controls) -->
    <circle cx="145" cy="130" r="3.5" class="win-close" />
    <circle cx="157" cy="130" r="3.5" class="win-minimize" />
    <circle cx="169" cy="130" r="3.5" class="win-maximize" />
    <!-- Tab -->
    <rect x="185" y="126" width="60" height="9" rx="2" class="tab-active" />
    <text x="215" y="133" text-anchor="middle" class="tab-text">app.ts</text>

    <!-- ===== COFFEE MUG ===== -->
    <g class="coffee-group" transform="translate(430, 310)">
      <!-- Mug body -->
      <rect x="0" y="16" width="36" height="40" rx="5" class="mug-body" />
      <!-- Mug handle -->
      <path d="M36 24 Q52 24 52 36 Q52 48 36 48" fill="none" stroke-width="4" class="mug-handle" />
      <!-- Coffee surface -->
      <ellipse cx="18" cy="20" rx="14" ry="3" class="coffee-surface" />

      <!-- Steam lines -->
      <g filter="url(#steamBlur)">
        <path d="M10 12 Q14 0 10 -10" class="steam steam-1" fill="none" stroke-width="2" />
        <path d="M18 10 Q22 -2 18 -14" class="steam steam-2" fill="none" stroke-width="2" />
        <path d="M26 12 Q30 0 26 -10" class="steam steam-3" fill="none" stroke-width="2" />
      </g>
    </g>

    <!-- ===== PLANT ===== -->
    <g class="plant-group" transform="translate(55, 300)">
      <!-- Pot -->
      <path d="M10 50 L6 70 L38 70 L34 50 Z" class="pot-body" />
      <rect x="4" y="46" width="36" height="8" rx="3" class="pot-rim" />

      <!-- Stems and leaves -->
      <path d="M22 46 Q22 30 16 20" fill="none" stroke-width="2" class="plant-stem" />
      <path d="M22 46 Q22 28 28 16" fill="none" stroke-width="2" class="plant-stem" />
      <path d="M22 46 Q20 32 12 28" fill="none" stroke-width="2" class="plant-stem" />

      <!-- Leaves -->
      <ellipse cx="14" cy="18" rx="8" ry="5" transform="rotate(-30 14 18)" class="leaf leaf-1" />
      <ellipse cx="30" cy="14" rx="8" ry="5" transform="rotate(20 30 14)" class="leaf leaf-2" />
      <ellipse cx="10" cy="26" rx="7" ry="4" transform="rotate(-50 10 26)" class="leaf leaf-3" />
    </g>

    <!-- ===== FLOATING TECH BADGES ===== -->

    <!-- Angular Shield -->
    <g class="float-badge badge-angular" transform="translate(440, 140)">
      <rect x="-24" y="-18" width="48" height="36" rx="10" class="badge-bg" />
      <path d="M0 -10 L-10 -5 L-8 6 L0 10 L8 6 L10 -5 Z" class="angular-shield" stroke-width="1.5" fill="none" />
      <text x="0" y="3" text-anchor="middle" class="angular-a">A</text>
    </g>

    <!-- Code Brackets -->
    <g class="float-badge badge-code" transform="translate(78, 155)">
      <rect x="-22" y="-16" width="44" height="32" rx="10" class="badge-bg" />
      <text x="0" y="5" text-anchor="middle" class="badge-symbol">&lt;/&gt;</text>
    </g>

    <!-- API / Cloud -->
    <g class="float-badge badge-api" transform="translate(460, 260)">
      <rect x="-22" y="-14" width="44" height="28" rx="10" class="badge-bg" />
      <text x="0" y="4" text-anchor="middle" class="badge-symbol-sm">API</text>
    </g>

    <!-- Git Branch -->
    <g class="float-badge badge-git" transform="translate(56, 240)">
      <circle cx="0" cy="0" r="18" class="badge-bg-round" />
      <circle cx="-4" cy="-5" r="2.5" class="git-dot" />
      <circle cx="4" cy="5" r="2.5" class="git-dot" />
      <path d="M-4 -5 Q-4 5 4 5" fill="none" stroke-width="1.5" class="git-line" />
    </g>

    <!-- Terminal prompt -->
    <g class="float-badge badge-terminal" transform="translate(420, 95)">
      <rect x="-20" y="-13" width="40" height="26" rx="6" class="badge-bg" />
      <text x="0" y="4" text-anchor="middle" class="badge-symbol">$_</text>
    </g>
  </svg>
</div>
